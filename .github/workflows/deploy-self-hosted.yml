name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main
      environment_name:
        description: Deployment environment label
        required: false
        default: production

jobs:
  deploy:
    name: Deploy to Self-Hosted Runner
    runs-on:
      - self-hosted
      - linux
      - x64
    environment:
      name: ${{ inputs.environment_name }}
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Copy deploy env from runner host
        shell: bash
        run: |
          SOURCE_ENV="/mnt/c/Link-in-bio/deploy/.env.prod"
          test -f "$SOURCE_ENV" || {
            echo "Missing $SOURCE_ENV on the runner machine."
            echo "Create it from deploy/.env.prod.example first."
            exit 1
          }
          cp "$SOURCE_ENV" deploy/.env.prod

      - name: Verify deploy env file
        shell: bash
        run: |
          test -f deploy/.env.prod || {
            echo "Missing deploy/.env.prod inside workflow workspace."
            exit 1
          }

      - name: Deploy stack
        shell: bash
        run: |
          chmod +x deploy/scripts/deploy-self-hosted.sh
          ./deploy/scripts/deploy-self-hosted.sh

      - name: Show running services
        shell: bash
        run: |
          docker compose --env-file deploy/.env.prod -f deploy/docker-compose.prod.yml ps
