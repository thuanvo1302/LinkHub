version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: linkhub-postgres
    environment:
      POSTGRES_DB: linkhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: linkhub-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: linkhub-backend
    environment:
      APP_NAME: LinkHub API
      APP_PORT: 8081
      JWT_SECRET: change-me
      APP_BASE_URL: http://localhost:8081
      FRONTEND_URL: http://localhost:3002
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/linkhub?sslmode=disable
      REDIS_ADDR: redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: linkhub-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8081
    ports:
      - "3002:3002"
    depends_on:
      - backend

volumes:
  postgres_data:
